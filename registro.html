<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Black Crown Barber</title>
    <link rel="stylesheet" href="./styles/loginStyles.css">
</head>
<body class="App">
    <div class="layout-container">

        <header class="header-top">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <img style="border-radius: 10px;" width="45px" src="./img/logobarber.jpeg" alt="Logo">
                    </div>
                    <span class="brand-name">Royal Barber</span>
                </div>
            </div>
        </header>

        <main class="main-content flex-center">
            <div class="login-container">
                <div class="login-card">

                    <div class="login-header">
                        <h2>Crear <span class="hero-highlight">Cuenta</span></h2>
                        <p>Registro de clientes Royal Barber.</p>
                    </div>

                    <form id="registro-form" class="login-form" novalidate>

                        <div class="form-group">
                            <label for="nombre">Nombre Completo</label>
                            <div class="input-wrapper">
                                <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <div class="input-wrapper">
                                <input type="text" id="email" name="email" placeholder="tu@correo.com">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <div class="input-wrapper">
                                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirm_password">Confirmar Contraseña</label>
                            <div class="input-wrapper">
                                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repite tu contraseña">
                            </div>
                        </div>

                        <button type="submit" class="btn-login">Registrarme</button>

                    </form>

                </div>
            </div>
        </main>

    </div>

    <script type="module" src="./js/lib/validaRegistro.js"></script>
</body>
</html>
